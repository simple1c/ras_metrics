ras_host: "localhost"
ras_port: "1545"

# 1. Дефолтные учетки для ВСЕХ баз
default_credentials:
  user: "cluster_monitor"
  pwd: "${DEFAULT_1C_PWD}"

# 2. Индивидуальные переопределения (по UUID или Имени)
infobase_credentials:
  "a1d8ff58-df9e-4a94-8a75-517782d50357":
    user: "jenkins-dev"
    pwd: "${INFOBASE_PWD_DO}"

# 3. Полностью динамический список метрик и команд rac
metrics:
  # Пример 1: Список баз (просто факт наличия = 1)
  - name: "infobase_summary_list"
    help: "List of infobases in cluster"
    # Scope указывает уровень: 'cluster' или 'infobase'
    scope: "cluster"
    command: "infobase summary list --cluster={cluster_id}"
    labels:
      - "name"
      - "descr"
      - "infobase"
    default_value: 1.0

  # Пример 2: Детальная информация по базе с разбиением по полям
  - name: "infobase_info"
    help: "Detailed infobase settings"
    scope: "infobase" # Автоматически выполнится для каждой базы
    command: "infobase info --cluster={cluster_id} --infobase={infobase_id}"
    requires_auth: true
    # Раскладываем вывод rac на отдельные динамические метрики
    split_metrics:
      - field: "sessions-deny"
        metric_suffix: "sessions_deny"
        labels: ["name"]
      - field: "scheduled-jobs-deny"
        metric_suffix: "scheduled_jobs_deny"
        labels: ["name"]
      - field: "security-level"
        metric_suffix: "security_level"
        labels: ["name"]